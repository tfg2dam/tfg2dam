<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>BTC en tiempo real (€)</title>
  </head>
  <body style="font-family:sans-serif;text-align:center;margin-top:60px">
    <h1>💶 Precio de Bitcoin</h1>
    <h2 id="precio">Cargando...</h2>

    <script>
      const p = document.getElementById("precio");
      let prev = 0;

      const ws = new WebSocket("wss://stream.binance.com:9443/ws/btceur@trade");
      ws.onmessage = e => {
        const { p: price } = JSON.parse(e.data);
        const v = parseFloat(price);
        p.textContent = v.toLocaleString("es-ES", { style: "currency", currency: "EUR" });
        p.style.color = v > prev ? "green" : v < prev ? "red" : "black";
        prev = v;
      };
      ws.onerror = () => p.textContent = "Error de conexión";
    </script>
  </body>
</html>
