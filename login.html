<!DOCTYPE html>
<html lang="es">
<head>
  <title>Iniciar sesión - AvanzaUni</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <h1>Inicia sesión</h1>
    
    <form>
      <!-- Email -->
      <div class="input-group">
        <span class="icon">📧</span>
        <input type="email" placeholder="Email *" required>
      </div>

      <!-- Contraseña -->
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" placeholder="Contraseña *" required>
      </div>

      <!-- No cerrar sesión -->
      <label class="remember">
        <input type="checkbox"> No cerrar sesión
      </label>

      <!-- Botón Iniciar sesión -->
      <button type="submit" class="btn primary">Inicia sesión</button>

      <!-- Botón Registrarse -->
      <a href="registro.html" class="btn secondary">¿Aún no tienes cuenta?</a>

      <!-- Recuperar contraseña -->
      <a href="#" class="forgot">¿Has olvidado tu contraseña?</a>
    </form>
  </div>
</body>
</html>
